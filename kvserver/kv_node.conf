# KvRaftServer configuration file
#
# Usage:
#   ./bin/kv_cluster_main -c kv_node.conf [--node_id <n>]
#
# The --node_id flag overrides the node_id key below, which lets you share
# one config file across the whole cluster and pick the identity at launch.

# ---- This node's identity ----
node_id   = 0

# Listening address for both the Raft RPC server and the KV RPC service.
listen_ip   = 0.0.0.0
listen_port = 8000

# Directory used to persist the raft log, hard state and snapshots.
# Defaults to data/node_<node_id> when omitted.
data_dir = data/node_0

# ---- Thread pool ----
io_threads     = 1
worker_threads = 4

# ---- Snapshot ----
# Trigger an automatic snapshot every N applied entries (0 = disabled).
snapshot_threshold = 1000

# ---- Raft timing (milliseconds) ----
election_timeout_min_ms = 150
election_timeout_max_ms = 300
heartbeat_interval_ms   = 50

# ---- Cluster topology ----
# List every node (including self) as node_<id>_ip / node_<id>_port.
# The loader skips the entry matching node_id automatically.
node_count   = 3

node_0_ip    = 127.0.0.1
node_0_port  = 8000

node_1_ip    = 127.0.0.1
node_1_port  = 8001

node_2_ip    = 127.0.0.1
node_2_port  = 8002
