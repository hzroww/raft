syntax = "proto3";
package raft;

option cc_generic_services = true;

enum EntryType {
    ENTRY_NORMAL = 0;
    ENTRY_CONFIG = 1;
}

enum ConfigChangeType {
    ADD_PEER    = 0;
    REMOVE_PEER = 1;
}

// Carried in LogEntry.command when type == ENTRY_CONFIG.
message ConfigChange {
    ConfigChangeType change_type = 1;
    int64            node_id     = 2;
    string           ip          = 3;
    int32            port        = 4;
}

message LogEntry {
    int64     term    = 1;
    int64     index   = 2;
    bytes     command = 3;
    EntryType type    = 4;
}

message RequestVoteArgs {
    int64 term          = 1;
    int64 candidateId   = 2;
    int64 lastLogIndex  = 3;
    int64 lastLogTerm   = 4;
}

message RequestVoteReply {
    int64 term        = 1;
    bool  voteGranted = 2;
}

message AppendEntriesArgs {
    int64             term         = 1;
    int64             leaderId     = 2;
    int64             prevLogIndex = 3;
    int64             prevLogTerm  = 4;
    repeated LogEntry entries      = 5;
    int64             leaderCommit = 6;
}

message AppendEntriesReply {
    int64 term          = 1;
    bool  success       = 2;
    int64 conflictIndex = 3;
    int64 conflictTerm  = 4;
}

message InstallSnapshotArgs {
    int64 term              = 1;
    int64 leaderId          = 2;
    int64 lastIncludedIndex = 3;
    int64 lastIncludedTerm  = 4;
    bytes data              = 5;
    bool  done              = 6;
}

message InstallSnapshotReply {
    int64 term = 1;
}

message AddPeerArgs {
    int64  node_id = 1;
    string ip      = 2;
    int32  port    = 3;
}

message AddPeerReply {
    bool   success   = 1;
    string message   = 2;
    int64  leader_id = 3;  // set when success==false and we know the leader
}

message RemovePeerArgs {
    int64 node_id = 1;
}

message RemovePeerReply {
    bool   success   = 1;
    string message   = 2;
    int64  leader_id = 3;
}

service RaftRpc {
    rpc RequestVote(RequestVoteArgs)         returns (RequestVoteReply);
    rpc AppendEntries(AppendEntriesArgs)     returns (AppendEntriesReply);
    rpc InstallSnapshot(InstallSnapshotArgs) returns (InstallSnapshotReply);
    rpc AddPeer(AddPeerArgs)                 returns (AddPeerReply);
    rpc RemovePeer(RemovePeerArgs)           returns (RemovePeerReply);
}
